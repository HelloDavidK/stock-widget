<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Widget</title>

  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .stock-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid #ddd;
      background: white;
      gap: 8px;
      white-space: nowrap;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .loading .dot {
      background: #f59e0b;
      animation: blink 1.2s infinite;
    }

    .in-stock .dot {
      background: #16a34a;
      animation: blink 1.4s infinite;
    }

    .out-stock .dot {
      background: #dc2626;
      animation: blink 1.4s infinite;
    }

    .error .dot {
      background: #6b7280;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @media (max-width: 480px) {
      .stock-label {
        font-size: 13px;
        padding: 5px 12px;
      }

      .dot {
        width: 10px;
        height: 10px;
      }
    }
  </style>
</head>

<body>
  <div id="stock-status" class="stock-label loading">
    <span class="dot"></span> Vérification...
  </div>

  <script>
    const JSON_URL = "https://hellodavidk.github.io/stock-widget/stock.json";
    const CACHE_KEY = "stock_widget_cache_v1";
    const CACHE_TIME_KEY = "stock_widget_cache_time_v1";

    // Durée du cache local : 5 minutes
    const CACHE_TTL = 5 * 60 * 1000;

    const params = new URLSearchParams(window.location.search);
    const sku = (params.get("sku") || "").trim();
    const stockStatus = document.getElementById("stock-status");

    function setStatus(type, text) {
      stockStatus.className = `stock-label ${type}`;
      stockStatus.innerHTML = `<span class="dot"></span> ${text}`;
    }

    function renderStock(data) {
      if (!sku) {
        setStatus("error", "SKU manquant");
        return false;
      }

      if (!data || typeof data !== "object") {
        return false;
      }

      if (!(sku in data)) {
        setStatus("error", "SKU introuvable");
        return true;
      }

      const qty = Number(data[sku] ?? 0);

      if (qty > 0) {
        setStatus("in-stock", "En stock");
      } else {
        setStatus("out-stock", "Rupture");
      }

      return true;
    }

    function getCachedData() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        const time = Number(localStorage.getItem(CACHE_TIME_KEY) || 0);

        if (!raw || !time) return null;

        const isExpired = (Date.now() - time) > CACHE_TTL;
        const data = JSON.parse(raw);

        return { data, isExpired };
      } catch {
        return null;
      }
    }

    function saveCache(data) {
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify(data));
        localStorage.setItem(CACHE_TIME_KEY, String(Date.now()));
      } catch {
        // Ignore si localStorage indisponible
      }
    }

    async function fetchFreshData() {
      // petit cache-buster léger pour éviter un cache trop agressif
      const version = Math.floor(Date.now() / 60000); // change chaque minute
      const response = await fetch(`${JSON_URL}?v=${version}`, {
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error("Impossible de charger le stock");
      }

      return await response.json();
    }

    async function loadStock() {
      if (!sku) {
        setStatus("error", "SKU manquant");
        return;
      }

      const cached = getCachedData();
      let renderedFromCache = false;

      // 1. Affichage immédiat depuis le cache si disponible
      if (cached && cached.data) {
        renderedFromCache = renderStock(cached.data);
      }

      // 2. Si pas de cache, on garde le loader
      if (!renderedFromCache) {
        setStatus("loading", "Vérification...");
      }

      // 3. Mise à jour en arrière-plan
      try {
        const freshData = await fetchFreshData();
        saveCache(freshData);
        renderStock(freshData);
      } catch {
        // Si rien n’a été affiché depuis le cache, on montre l’erreur
        if (!renderedFromCache) {
          setStatus("error", "Erreur stock");
        }
      }
    }

    loadStock();
  </script>
</body>
</html>
